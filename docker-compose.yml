services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      FLASK_ENV: production
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in your .env}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANSWER_MODEL: ${ANSWER_MODEL:-claude-sonnet-4-6}
      DATABASE_URL: sqlite:////data/db/app.db
      FRONTEND_ORIGINS: http://localhost:5173
    volumes:
      - uploads:/data/uploads
      - vectorstore:/data/vectorstore
      - db:/data/db
      - hf-cache:/data/hf-cache

  # Frontend in dev mode (Vite dev server with HMR)
  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  uploads:
  vectorstore:
  db:
  hf-cache:
  frontend_node_modules:
